name: Telegram Market Manual Test

on:
  workflow_dispatch:
    inputs:
      report:
        description: 'Which report?'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - afternoon
          - evening
          - all

permissions:
  contents: write

jobs:
  manual-test:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
      KRX_ID: ${{ secrets.KRX_ID }}
      KRX_PW: ${{ secrets.KRX_PW }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Morning
        if: github.event.inputs.report == 'morning' || github.event.inputs.report == 'all'
        run: python market_bot.py morning

      - name: Afternoon
        if: github.event.inputs.report == 'afternoon' || github.event.inputs.report == 'all'
        run: python market_bot.py afternoon

      - name: Commit flow snapshot
        if: github.event.inputs.report == 'afternoon' || github.event.inputs.report == 'all'
        run: |
          if [ -f flow_snapshot.json ]; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add flow_snapshot.json
            git commit -m "Update flow snapshot" || echo "No changes to commit"
            git push
          else
            echo "flow_snapshot.json not found"
          fi

      - name: Evening
        if: github.event.inputs.report == 'evening' || github.event.inputs.report == 'all'
        run: python market_bot.py evening
