name: Telegram Market Alert

on:
  schedule:
    - cron: '0 23 * * 0-4'
    - cron: '35 6 * * 1-5'
    - cron: '40 11 * * 1-5'
    - cron: '0 12 * * 1-5'

  workflow_dispatch:
    inputs:
      report:
        description: 'Which report to test?'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - afternoon
          - evening
          - all

jobs:
  send-market-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send morning report
        if: github.event.schedule == '0 23 * * 0-4'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
        run: python market_bot.py morning

      - name: Send afternoon report
        if: github.event.schedule == '35 6 * * 1-5'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
        run: python market_bot.py afternoon

      - name: Commit flow snapshot
        if: github.event.schedule == '35 6 * * 1-5' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.report == 'afternoon' || github.event.inputs.report == 'all'))
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add flow_snapshot.json
          git commit -m "Update flow snapshot" || echo "No changes to commit"
          git push

      - name: Send evening report
        if: github.event.schedule == '0 12 * * 1-5' || github.event.schedule == '40 11 * * 1-5'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
        run: python market_bot.py evening

      - name: Manual morning test
        if: github.event_name == 'workflow_dispatch' && (github.event.inputs.report == 'morning' || github.event.inputs.report == 'all')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
        run: python market_bot.py morning

      - name: Manual afternoon test
        if: github.event_name == 'workflow_dispatch' && (github.event.inputs.report == 'afternoon' || github.event.inputs.report == 'all')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
        run: python market_bot.py afternoon

      - name: Manual evening test
        if: github.event_name == 'workflow_dispatch' && (github.event.inputs.report == 'evening' || github.event.inputs.report == 'all')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
        run: python market_bot.py evening
