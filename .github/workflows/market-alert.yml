name: Telegram Market Alert

on:
  workflow_dispatch:
    inputs:
      report:
        description: 'Which report to test?'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - afternoon
          - evening
          - all
          
  schedule:
    - cron: '0 23 * * 0-4'
    - cron: '35 6 * * 1-5'
    - cron: '20 12 * * 1-5'
    - cron: '0 12 * * 1-5'

jobs:
  send-market-alert:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      KRX_API_KEY: ${{ secrets.KRX_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scheduled morning report
        if: github.event_name == 'schedule' && github.event.schedule == '0 23 * * 0-4'
        run: python market_bot.py morning

      - name: Scheduled afternoon report
        if: github.event_name == 'schedule' && github.event.schedule == '35 6 * * 1-5'
        run: python market_bot.py afternoon

      - name: Scheduled evening report test
        if: github.event_name == 'schedule' && github.event.schedule == '20 12 * * 1-5'
        run: python market_bot.py evening

      - name: Scheduled evening report
        if: github.event_name == 'schedule' && github.event.schedule == '0 12 * * 1-5'
        run: python market_bot.py evening

      - name: Manual morning test
        if: github.event_name == 'workflow_dispatch' && (github.event.inputs.report == 'morning' || github.event.inputs.report == 'all')
        run: python market_bot.py morning

      - name: Manual afternoon test
        if: github.event_name == 'workflow_dispatch' && (github.event.inputs.report == 'afternoon' || github.event.inputs.report == 'all')
        run: python market_bot.py afternoon

      - name: Manual evening test
        if: github.event_name == 'workflow_dispatch' && (github.event.inputs.report == 'evening' || github.event.inputs.report == 'all')
        run: python market_bot.py evening

      - name: Commit flow snapshot
        if: always() && hashFiles('flow_snapshot.json') != ''
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add flow_snapshot.json
          git commit -m "Update flow snapshot" || echo "No changes to commit"
          git push
